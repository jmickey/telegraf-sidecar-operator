[agent]
  collection_jitter = "0s"
  debug = false
  flush_interval = "10s"
  flush_jitter = "3s"
  hostname = "$NODENAME"
  interval = "10s"
  logfile = ""
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  quiet = false
  round_interval = true

[inputs]

[outputs]

  [[outputs.file]]
    files = ["stdout"]

[aggregators]

  [[aggregators.basicstats]]
    period = "30s"
    stats = ["count", "sum", "mean"]

[global_tags]
  namespace = "$NAMESPACE"
  nodename = "$NODENAME"
  pod_name = "$HOSTNAME"
  type = "app"
